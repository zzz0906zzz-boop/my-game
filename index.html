<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>My Game</title>
  <link rel="stylesheet" href="css/style.css?v=5" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <h1 class="game-title">My Game</h1>
      <div class="topbar-stats">
        <span id="gemCount">0</span>
      </div>
    </header>

    <main class="screen-wrap">
      <section id="titleScreen" class="screen active">
        <div class="panel">
          <h2>タイトル</h2>
          <p>指でなぞって動くシューティング</p>
          <button id="startGameBtn" class="primary-btn">ゲーム開始</button>
        </div>
      </section>

      <section id="battleScreen" class="screen">
        <div class="hud">
          <div class="hud-row">
            <span>HP</span>
            <div class="bar"><div id="hpBar" class="fill hp-fill"></div></div>
          </div>
          <div class="hud-row">
            <span>必殺</span>
            <div class="bar"><div id="skillBar" class="fill skill-fill"></div></div>
          </div>
          <div class="hud-row info-row">
            <span>撃破: <b id="killCount">0</b></span>
            <span>距離: <b id="distanceCount">0</b></span>
          </div>
        </div>

        <div class="upgrade-panel">
          <div class="upgrade-chip"><span>連射</span><b id="lvFireRate">1</b></div>
          <div class="upgrade-chip"><span>弾サイズ</span><b id="lvBulletSize">1</b></div>
          <div class="upgrade-chip"><span>弾速</span><b id="lvBulletSpeed">1</b></div>
          <div class="upgrade-chip"><span>貫通</span><b id="lvPierce">1</b></div>
          <div class="upgrade-chip"><span>必殺効率</span><b id="lvSkillGain">1</b></div>
        </div>

        <div id="gameArea" class="game-area">
          <div class="scroll-bg"></div>
          <div class="scroll-bg bg2"></div>
          <div class="vignette"></div>

          <div id="bossHud" class="boss-hud">
            <span>BOSS</span>
            <div class="bar boss-bar"><div id="bossHpBar" class="fill boss-fill"></div></div>
          </div>

          <div id="warningText" class="warning-text">WARNING</div>
          <div id="damageFlash" class="damage-flash"></div>
          <div id="skillFlash" class="skill-flash"></div>

          <div id="player" class="player">
            <div class="chibi">★</div>
          </div>

          <div id="pickupsLayer"></div>
          <div id="enemiesLayer"></div>
          <div id="bulletsLayer"></div>
          <div id="effectsLayer"></div>
        </div>

        <div class="controls">
          <button id="skillBtn" class="skill-btn">必殺</button>
        </div>
      </section>

      <section id="resultScreen" class="screen">
        <div class="panel">
          <h2>リザルト</h2>
          <p>撃破数: <span id="resultKills">0</span></p>
          <p>到達距離: <span id="resultDistance">0</span></p>
          <p>獲得ジェム: <span id="resultGems">0</span></p>
          <button id="backToTitleBtn" class="primary-btn">タイトルへ戻る</button>
        </div>
      </section>
    </main>
  </div>

  <script src="js/game.js?v=5"></script>
</body>
</html>
